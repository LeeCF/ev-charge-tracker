<h2>现有 4 个页面 · 逐一审查</h2>
<p class="subtitle">点击你觉得最需要重新设计的页面（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="dashboard" onclick="toggleSelect(this)">
    <div class="letter">①</div>
    <div class="content">
      <h3>首页 Dashboard</h3>
      <p>倒计时卡片 + 上次充电摘要 + FAB 按钮。核心页面，用户每天打开首先看到的。</p>
    </div>
  </div>
  <div class="option" data-choice="history" onclick="toggleSelect(this)">
    <div class="letter">②</div>
    <div class="content">
      <h3>历史记录 + 费用统计</h3>
      <p>充电记录列表（可滑删）+ 月度/年度费用统计切换。</p>
    </div>
  </div>
  <div class="option" data-choice="add-sheet" onclick="toggleSelect(this)">
    <div class="letter">③</div>
    <div class="content">
      <h3>添加记录底部弹窗</h3>
      <p>日期、充电类型、是否满充、电量、地点、费用、备注表单。</p>
    </div>
  </div>
  <div class="option" data-choice="settings" onclick="toggleSelect(this)">
    <div class="letter">④</div>
    <div class="content">
      <h3>设置页</h3>
      <p>电池类型选择、满充间隔、车型名称、清空数据。</p>
    </div>
  </div>
</div>
