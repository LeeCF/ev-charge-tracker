<h2>你觉得 App 现在哪里最让你不满意？</h2>
<p class="subtitle">选出最困扰你的问题（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="color" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>配色太平淡</h3>
      <p>冷蓝灰背景 + 钴蓝感觉没有层次，缺少视觉冲击力</p>
    </div>
  </div>
  <div class="option" data-choice="hierarchy" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>信息层次不清</h3>
      <p>首页卡片太多、太相似，不知道该先看哪里</p>
    </div>
  </div>
  <div class="option" data-choice="interaction" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>交互缺乏反馈感</h3>
      <p>点击按钮、切换 Tab 没有动效，操作感觉"干"</p>
    </div>
  </div>
  <div class="option" data-choice="typography" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>字体/排版显得普通</h3>
      <p>数字和标题不够醒目，读起来像普通列表</p>
    </div>
  </div>
</div>
