<h2>"交互高级感"对你来说是什么？</h2>
<p class="subtitle">选出你最在意的交互体验（可多选）</p>

<div class="options" data-multiselect>

  <div class="option" data-choice="motion" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>流畅的过渡动效</h3>
      <p>页面切换、卡片出现、数字变化都有丝滑动画，不是硬切</p>
    </div>
  </div>

  <div class="option" data-choice="haptic" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>按压反馈 / 触觉感</h3>
      <p>按钮点下去有明显的视觉压缩感，像真实物理按键</p>
    </div>
  </div>

  <div class="option" data-choice="number" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>数字滚动动画</h3>
      <p>天数、费用等数字变化时像机械表翻牌，而不是直接跳变</p>
    </div>
  </div>

  <div class="option" data-choice="swipe" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>手势操作更自然</h3>
      <p>添加记录底部弹出更顺滑，列表滑动删除有弹性回弹</p>
    </div>
  </div>

</div>
